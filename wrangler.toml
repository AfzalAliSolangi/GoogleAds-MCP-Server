name = 'ga-mcp-clients'
main = "src/worker.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace — stores MCP session tokens, client configs, and oauth_client_index entries.
# IMPORTANT: This must be a NEW namespace, separate from the old ga-mcp-server-cloudflare namespace.
# Create: npx wrangler kv namespace create GA_MCP_KV
# Then paste the returned id values below (replace the placeholder).
[[kv_namespaces]]
binding    = "GA_MCP_KV"
id         = "ff493d28ccbd456bb3a2fd7f891fea9a"
preview_id = "ff493d28ccbd456bb3a2fd7f891fea9a"

# Secrets — set fresh on this worker via `wrangler secret put <NAME>`:
#   GOOGLE_ADS_DEVELOPER_TOKEN    — always required
#   OAUTH_CLIENT_ID               — optional; required for root /mcp admin endpoint
#   OAUTH_CLIENT_SECRET           — optional; required for root /mcp admin endpoint
#   ACCESS_TOKEN                  — optional; fallback for wrangler dev without KV
# Google Ads API — pick one auth mode:
#   Mode A: GOOGLE_ADS_OAUTH_CLIENT_ID, GOOGLE_ADS_OAUTH_CLIENT_SECRET, GOOGLE_ADS_REFRESH_TOKEN
#   Mode B: GCP_SERVICE_ACCOUNT_BASE64, GOOGLE_ADS_IMPERSONATE_USER
# Optional:
#   GOOGLE_ADS_LOGIN_CUSTOMER_ID  — global MCC manager account ID (shared across all tenants)
#   BASE_URL                      — set to origin only (e.g. https://ga-mcp-clients.example.workers.dev)
